<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | AquaCraft Pools</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B3247;
    --aqua: #1FC8C2;
    --sand: #F7F2E7;
    --transition-premium: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #051924;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    margin: 0;
    overflow: hidden;
    position: relative;
  }

  /* Premium Animated Floating Background Orbs */
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 1;
    opacity: 0.4;
  }

  body::before {
    width: 350px;
    height: 350px;
    background: var(--aqua);
    top: -50px;
    left: -50px;
    animation: floatOrbOne 12s infinite alternate ease-in-out;
  }

  body::after {
    width: 400px;
    height: 400px;
    background: var(--navy);
    bottom: -100px;
    right: -100px;
    animation: floatOrbTwo 15s infinite alternate ease-in-out;
  }

  @keyframes floatOrbOne {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 50px) scale(1.2); }
  }

  @keyframes floatOrbTwo {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-60px, -80px) scale(1.1); }
  }

  /* Frosted Glassmorphism Premium Card with Scale-In Animation */
  .card-box {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 45px 40px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
    max-width: 420px;
    width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.4);
    z-index: 2;
    opacity: 0;
    transform: scale(0.92);
    animation: premiumReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes premiumReveal {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .brand {
    font-family: 'Archivo Black';
    font-size: 1.6rem;
    color: var(--navy);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .brand span {
    color: #19aba5;
  }

  .sub {
    color: #526675;
    font-size: 0.95rem;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .form-label {
    color: var(--navy);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .form-control {
    border: 2px solid rgba(11, 50, 71, 0.1);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 0.95rem;
    color: var(--navy);
    background-color: rgba(255, 255, 255, 0.5);
    transition: var(--transition-premium);
  }

  .form-control:focus {
    background-color: #fff;
    border-color: var(--aqua);
    box-shadow: 0 0 0 4px rgba(31, 200, 194, 0.2);
    outline: 0;
  }

  /* Luxury Button with Shimmer Reflection Effect */
  .btn-navy {
    background: var(--navy);
    color: #fff;
    font-weight: 600;
    padding: 14px;
    border-radius: 12px;
    border: none;
    letter-spacing: 0.5px;
    transition: var(--transition-premium);
    position: relative;
    overflow: hidden;
  }

  .btn-navy::before {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg);
  }

  .btn-navy:hover::before {
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    100% { left: 150%; }
  }

  .btn-navy:hover {
    background: #134661;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(11, 50, 71, 0.3);
  }

  .btn-navy:active {
    transform: translateY(0);
  }

  .alert-danger {
    background-color: #FFF5F5;
    border: 1px solid #FED7D7;
    color: #C53030;
    border-radius: 12px;
    font-size: 0.9rem;
    padding: 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: smoothShake 0.4s ease-in-out;
  }

  @keyframes smoothShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
</style>
</head>
<body>

<div class="card-box">
  <div class="brand">Aqua<span>Craft</span> Admin</div>
  <p class="sub">Sign in to manage products, gallery, reviews & orders.</p>

  {% if form.errors %}
    <div class="alert alert-danger">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      Incorrect username or password.
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required autofocus autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required autocomplete="current-password">
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-navy w-100">Log In</button>
  </form>
</div>

</body>
</html>
